# Aztec Recording Rules
#
# Pre-compute expensive queries for dashboard performance.
# Rules preserve the 'job' label for multi-node setups.

groups:
  - name: aztec_recording
    interval: 30s
    rules:
      # Block proposal success rate, per node
      - record: aztec:proposal_success_rate
        expr: |
          sum by (job) (increase(aztec_sequencer_slot_filled_count[15m]))
          / sum by (job) (increase(aztec_sequencer_slot_count[15m]))

      # L1 transaction success rate, per node
      - record: aztec:l1_tx_success_rate
        expr: |
          1 - (
            increase(aztec_l1_publisher_blob_tx_failure[1h])
            / (increase(aztec_l1_publisher_blob_tx_success[1h]) + increase(aztec_l1_publisher_blob_tx_failure[1h]) + 0.001)
          )

      # ETH balance burn rate (ETH consumed per hour, negative = draining)
      - record: aztec:publisher_balance_burn_rate_per_hour
        expr: deriv(aztec_l1_publisher_balance_eth[1h]) * 3600

      # Estimated hours until publisher balance hits zero
      - record: aztec:publisher_balance_hours_remaining
        expr: |
          aztec_l1_publisher_balance_eth
          / (-deriv(aztec_l1_publisher_balance_eth[1h]) * 3600 + 0.0001)

      # L1 gas price moving average (from histogram)
      - record: aztec:l1_gas_price_avg_gwei
        expr: |
          rate(aztec_l1_publisher_gas_price_gwei_sum[15m])
          / rate(aztec_l1_publisher_gas_price_gwei_count[15m])
