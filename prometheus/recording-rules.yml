# Aztec Recording Rules
#
# Pre-compute expensive queries for dashboard performance.
# Rules preserve the 'job' label so they work with multi-node setups
# (mainnet-active, mainnet-redundant, testnet).

groups:
  - name: aztec_recording
    interval: 30s
    rules:
      # Block processing rate (blocks per minute), per node
      - record: aztec:blocks_per_minute
        expr: rate(aztec_archiver_block_height[5m]) * 60

      # Block proposal success rate, per node
      # sum() needed: slot metrics emit multiple series per label set
      - record: aztec:proposal_success_rate
        expr: |
          sum by (job) (increase(aztec_sequencer_slot_filled_count[15m]))
          / sum by (job) (increase(aztec_sequencer_slot_count[15m]))

      # L1 transaction success rate, per node
      - record: aztec:l1_tx_success_rate
        expr: |
          1 - (
            increase(aztec_l1_publisher_blob_tx_failure[1h])
            / (increase(aztec_l1_publisher_blob_tx_success[1h]) + increase(aztec_l1_publisher_blob_tx_failure[1h]) + 0.001)
          )

      # CPU usage percentage (assuming 4 cores, adjust as needed)
      - record: aztec:cpu_usage_percent
        expr: rate(process_cpu_seconds_total[5m]) * 100 / 4

      # Memory usage in GB
      - record: aztec:memory_usage_gb
        expr: process_resident_memory_bytes / 1073741824

      # Sync progress (ratio of current height to network height)
      - record: aztec:sync_progress
        expr: |
          aztec_archiver_block_height
          / on() group_left max(aztec_archiver_block_height)

      # ETH balance burn rate (ETH consumed per hour, negative = draining), per node
      - record: aztec:publisher_balance_burn_rate_per_hour
        expr: deriv(aztec_l1_publisher_balance_eth[1h]) * 3600

      # Estimated hours until publisher balance hits zero at current burn rate, per node
      - record: aztec:publisher_balance_hours_remaining
        expr: |
          aztec_l1_publisher_balance_eth
          / (-deriv(aztec_l1_publisher_balance_eth[1h]) * 3600 + 0.0001)

      # LMDB usage ratio (used / map limit) - alerts if DB is filling up
      - record: aztec:db_usage_ratio
        expr: |
          aztec_db_used_size_bytes / (aztec_db_map_size_bytes + 1)

      # L1 gas price moving average (from histogram)
      - record: aztec:l1_gas_price_avg_gwei
        expr: |
          rate(aztec_l1_publisher_gas_price_gwei_sum[15m])
          / rate(aztec_l1_publisher_gas_price_gwei_count[15m])
