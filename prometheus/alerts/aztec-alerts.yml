# Aztec Sequencer Alert Rules
#
# Only uses metrics confirmed to exist in the actual OTEL export.
# Metrics verified against: aztec_archiver_*, aztec_l1_*, aztec_l1_publisher_*
# NOT exported (as of v4.1.0-rc.2): aztec_sequencer_*, aztec_peer_manager_*

groups:
  - name: aztec_critical
    rules:
      # Publisher running out of ETH - can't submit blocks without it
      - alert: LowL1PublisherBalance
        expr: aztec_l1_publisher_balance_eth < 0.2
        for: 5m
        labels:
          severity: critical
          component: publisher
        annotations:
          summary: "Publisher ETH critically low ({{ $labels.job }})"
          description: "Balance is {{ $value }} ETH on {{ $labels.job }}. Refill immediately."
          runbook: "Top up publisher address with at least 1 ETH"

      # Node stuck - not processing blocks
      - alert: L2BlockHeightNotIncreasing
        expr: increase(aztec_archiver_block_height{aztec_status=""}[15m]) == 0
        for: 5m
        labels:
          severity: critical
          component: archiver
        annotations:
          summary: "No L2 blocks in 15m ({{ $labels.job }})"
          description: "{{ $labels.job }} has not processed any blocks. May be stuck or out of sync."
          runbook: "Check archiver logs, verify L1 RPC, consider restart"

      # Local Geth down - all L1 operations fail
      - alert: GethNodeDown
        expr: aztec_geth_up == 0
        for: 2m
        labels:
          severity: critical
          component: geth
        annotations:
          summary: "Local Geth node is down"
          description: "Geth unreachable for 2 minutes. L1 operations will fail."
          runbook: "Check geth process, logs, and disk space"

  - name: aztec_warning
    rules:
      # L1 connection issues
      - alert: L1BlockHeightNotIncreasing
        expr: increase(aztec_l1_block_height[15m]) == 0
        for: 10m
        labels:
          severity: warning
          component: l1_rpc
        annotations:
          summary: "No new L1 blocks ({{ $labels.job }})"
          description: "No L1 block updates on {{ $labels.job }} in 15 minutes."
          runbook: "Verify L1 RPC endpoint, check ETHEREUM_HOSTS config"

      # Blob publishing failures
      - alert: BlobPublishingFailures
        expr: increase(aztec_l1_publisher_blob_tx_failure[15m]) > 0
        for: 5m
        labels:
          severity: warning
          component: publisher
        annotations:
          summary: "Blob tx failures ({{ $labels.job }})"
          description: "{{ $value }} failures on {{ $labels.job }} in 15 minutes."
          runbook: "Check L1 gas prices and publisher balance"

      # Balance getting low (softer threshold)
      - alert: L1PublisherBalanceLow
        expr: aztec_l1_publisher_balance_eth < 1.0 and aztec_l1_publisher_balance_eth >= 0.2
        for: 30m
        labels:
          severity: warning
          component: publisher
        annotations:
          summary: "Publisher ETH getting low ({{ $labels.job }})"
          description: "Balance is {{ $value }} ETH on {{ $labels.job }}. Top up soon."
          runbook: "Plan to add more ETH to publisher address"

      # Balance draining fast - will hit zero within 24h
      - alert: PublisherBalanceDrainingFast
        expr: |
          aztec:publisher_balance_hours_remaining > 0
          and aztec:publisher_balance_hours_remaining < 24
        for: 15m
        labels:
          severity: warning
          component: publisher
        annotations:
          summary: "Publisher ETH draining fast ({{ $labels.job }})"
          description: "Balance will reach zero in ~{{ $value | humanize }} hours on {{ $labels.job }}."
          runbook: "Check gas costs, top up publisher address"

      # Geth syncing for too long
      - alert: GethNodeSyncing
        expr: aztec_geth_syncing == 1
        for: 30m
        labels:
          severity: warning
          component: geth
        annotations:
          summary: "Geth still syncing"
          description: "Geth syncing for over 30 minutes. L1 data may be stale."
          runbook: "Wait for sync, check disk I/O and network"

      # Geth low peers
      - alert: GethLowPeerCount
        expr: aztec_geth_up == 1 and aztec_geth_peer_count < 3
        for: 10m
        labels:
          severity: warning
          component: geth
        annotations:
          summary: "Geth has few peers"
          description: "Only {{ $value }} peers. Risk of stale chain data."
          runbook: "Check geth networking, firewall, bootnodes"

      # Geth block stalled
      - alert: GethBlockStalled
        expr: aztec_geth_up == 1 and increase(aztec_geth_block_number[15m]) == 0
        for: 10m
        labels:
          severity: warning
          component: geth
        annotations:
          summary: "Geth block height not advancing"
          description: "No new blocks from geth in 15 minutes."
          runbook: "Check geth sync status and peer connections"

  - name: aztec_provider
    rules:
      # Running out of keystores
      - alert: LowKeystoreQueue
        expr: aztec_provider_queue_length < 5
        for: 1h
        labels:
          severity: warning
          component: provider
        annotations:
          summary: "Keystore queue running low"
          description: "Only {{ $value }} keystores left. New delegators can't stake."
          runbook: "Generate new keystores with 'aztec validator-keys new' and register them"

      # New delegation needs coinbase config
      # check-delegations.sh pushes aztec_provider_queue_decrease > 0 when queue shrinks
      - alert: NewDelegationDetected
        expr: aztec_provider_queue_decrease > 0
        for: 1m
        labels:
          severity: info
          component: provider
        annotations:
          summary: "New delegation detected"
          description: "{{ $value }} new delegation(s) detected (queue decreased). Configure coinbase."
          runbook: "Check staking dashboard, update keystore coinbase"
