# Prometheus Configuration for Aztec Sequencer Monitoring
#
# Multi-node setup:
#   - aztec-mainnet-active: Primary mainnet sequencer
#   - aztec-mainnet-redundant: Backup mainnet sequencer
#   - aztec-testnet: Testnet sequencer
#
# Each Aztec node exposes metrics via its own OTEL Collector on port 8889.
# Adjust hostnames/IPs below to match your deployment.
#
# Scrape targets:
#   1. OTEL Collectors (port 8889) - Aztec node metrics exported via OpenTelemetry
#      Exposes: aztec_archiver_*, aztec_sequencer_*, aztec_l1_*, aztec_peer_manager_*,
#               aztec_db_*, aztec_fisherman_*, aztec_ivc_verifier_*, etc.
#
#   2. Geth (port 6060) - Local execution layer client metrics
#      Exposes: eth_*, chain_*, p2p_*, txpool_*, system metrics
#
#   3. Lighthouse (port 5054) - Consensus layer client metrics
#      Exposes: beacon_*, libp2p_*, sync_*, validator_*, slot_*, epoch_*
#
#   4. Pushgateway (port 9091) - Custom metrics pushed by cron scripts
#      Exposes: aztec_geth_up, aztec_geth_block_number, aztec_publisher_balance_eth, etc.
#
#   5. OTEL Collector self-metrics (port 8888) - Health of the collector itself

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "recording-rules.yml"
  - "alerts/*.yml"

scrape_configs:
  # ── Aztec Node Metrics (via OTEL Collectors) ─────────────────────────
  # Each Aztec node has its own OTEL collector exporting Prometheus metrics.
  # The 'network' and 'role' labels help distinguish nodes in dashboards.
  #
  # Mainnet - Active sequencer
  - job_name: "aztec-mainnet-active"
    scrape_interval: 15s
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          network: "mainnet"
          role: "active"

  # Mainnet - Redundant sequencer (standby)
  # Uncomment and set the correct target when the redundant node is deployed.
  # - job_name: "aztec-mainnet-redundant"
  #   scrape_interval: 15s
  #   static_configs:
  #     - targets: ["otel-collector-redundant:8889"]
  #       labels:
  #         network: "mainnet"
  #         role: "redundant"

  # Testnet sequencer
  # Uncomment and set the correct target when the testnet node is deployed.
  # - job_name: "aztec-testnet"
  #   scrape_interval: 15s
  #   static_configs:
  #     - targets: ["otel-collector-testnet:8889"]
  #       labels:
  #         network: "testnet"
  #         role: "active"

  # ── Geth (Execution Layer) ───────────────────────────────────────────
  - job_name: "geth"
    scrape_interval: 15s
    metrics_path: /debug/metrics/prometheus
    static_configs:
      - targets: ["geth:6060"]
        labels:
          instance: "geth-local"

  # ── Lighthouse (Consensus Layer) ─────────────────────────────────────
  - job_name: "lighthouse"
    scrape_interval: 15s
    static_configs:
      - targets: ["lighthouse:5054"]
        labels:
          instance: "lighthouse-local"

  # ── Pushgateway (Custom Script Metrics) ──────────────────────────────
  - job_name: "pushgateway"
    honor_labels: true
    scrape_interval: 15s
    static_configs:
      - targets: ["pushgateway:9091"]

  # ── OTEL Collector Self-Metrics ──────────────────────────────────────
  - job_name: "otel-collector"
    scrape_interval: 30s
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          instance: "otel-collector"
